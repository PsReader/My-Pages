<html>
	<head>
		<meta charset="UTF-8">
    		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>LOTM-Songs</title>
		<style>
			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}
			
			@keyframes slideInDown {
				from {
					transform: translateY(-20px);
					opacity: 0;
				}
				to {
					transform: translateY(0);
					opacity: 1;
				}
			}
			
			@keyframes slideInUp {
				from {
					transform: translateY(15px);
					opacity: 0;
				}
				to {
					transform: translateY(0);
					opacity: 1;
				}
			}
			
			body {
				background: linear-gradient(135deg, rgba(20, 10, 25, 0.95), rgba(40, 20, 50, 0.95)),
						url('images/crimson moon.jpeg');
				background-attachment: fixed;
				color: #d4af9f;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			}
			
			h1 {
				color: #e8c8b8;
				font-size: 2.5rem;
				font-weight: 700;
				text-align: center;
				margin: 30px 0 20px;
				animation: slideInDown 0.6s ease-out;
				letter-spacing: 1px;
				text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
			}
			
			h2 {
				color: #d4af9f;
				font-size: 1.8rem;
				font-weight: 600;
				margin: 25px 0 15px;
				padding: 12px;
				background-color: rgba(212, 175, 159, 0.1);
				border-left: 3px solid rgba(212, 175, 159, 0.5);
				border-radius: 4px;
				animation: slideInUp 0.4s ease-out;
				transition: all 0.3s ease;
			}
			
			h2:hover {
				background-color: rgba(212, 175, 159, 0.15);
				border-left-color: rgba(212, 175, 159, 0.8);
				transform: translateX(5px);
			}
			
			h3 {
				color: #d4af9f;
				font-size: 1.2rem;
				font-weight: 600;
				animation: fadeIn 0.4s ease-out;
				transition: all 0.3s ease;
				margin: 15px 0 10px;
			}
			
			h3:hover {
				color: #e8c8b8;
				transform: translateX(5px);
			}
			
			div {
				animation: fadeIn 0.5s ease-out;
			}
			
			p, li {
				color: #d4af9f;
				font-size: 1rem;
				line-height: 1.6;
				margin: 10px 0;
			}
			
			.button1 {
				background-color: rgba(212, 175, 159, 0.15);
				color: #d4af9f;
				border: 1px solid rgba(212, 175, 159, 0.4);
				padding: 10px 20px;
				border-radius: 6px;
				transition: all 0.3s ease;
				cursor: pointer;
				font-weight: 500;
			}

			.button1:hover {
				background-color: rgba(212, 175, 159, 0.25);
				color: #e8c8b8;
				border-color: rgba(212, 175, 159, 0.8);
				transform: translateY(-2px);
				box-shadow: 0 4px 12px rgba(212, 175, 159, 0.2);
			}
			
			a {
				color: #d4af9f;
				background-color: transparent;
				text-decoration: none;
				transition: all 0.3s ease;
			}
			
			a:hover {
				color: #e8c8b8;
				text-decoration: underline;
			}
			
			.topnav {
				overflow: hidden;
				background: rgba(212, 175, 159, 0.1);
				border: 1px solid rgba(212, 175, 159, 0.3);
				border-radius: 6px;
				animation: slideInDown 0.6s ease-out;
				margin: 20px 0;
			}
			
			.topnav a {
				float: left;
				display: block;
				color: #d4af9f;
				text-align: center;
				padding: 14px 20px;
				text-decoration: none;
				transition: all 0.3s ease;
				font-weight: 500;
				font-size: 0.95rem;
			}
			
			.topnav a:hover {
				background-color: rgba(212, 175, 159, 0.2);
				border-bottom: 2px solid rgba(212, 175, 159, 0.8);
				color: #e8c8b8;
			}
			
			.topnav a.active-page {
				background-color: rgba(212, 175, 159, 0.2);
				border-bottom: 2px solid rgba(212, 175, 159, 0.8);
				color: #e8c8b8;
			}
			
			.zoom {
				padding: 10px;
				background-color: transparent;
				transition: transform 0.2s ease;
				cursor: pointer;
			}

			.zoom:hover {
				transform: scale(1.3);
			}
			
			table, th, td {
				border: 1px solid rgba(212, 175, 159, 0.4);
				border-collapse: collapse;
				padding: 12px;
				color: #d4af9f;
			}
			
			th {
				background-color: rgba(212, 175, 159, 0.2);
				color: #e8c8b8;
				font-weight: 600;
			}
			
			td:nth-child(even) {
				background-color: rgba(212, 175, 159, 0.08);
			}
			
			td:nth-child(odd) {
				background-color: rgba(212, 175, 159, 0.04);
			}
			
			@media (max-width: 768px) {
				h1 { font-size: 2rem; }
				h2 { font-size: 1.4rem; }
				.topnav { margin: 15px 0; }
				p, li { font-size: 0.95rem; }
			}
		</style>
