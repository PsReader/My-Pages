<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratchpad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Libre+Baskerville:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <h1>Scratchpad</h1>
          <p class="subtitle">Your Personal Scratchpad</p>
        </div>
        <div class="header-actions">
          <div class="theme-picker" id="themePicker">
            <button
              class="theme-button"
              id="themeButton"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
            >
              <span class="theme-button__meta">
                <span class="theme-button__label">Theme</span>
                <span class="theme-button__value" id="themeValue"></span>
              </span>
              <svg
                class="theme-arrow"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M6 9l6 6 6-6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div
              class="theme-menu"
              id="themeMenu"
              role="menu"
              aria-label="Choose a theme"
            ></div>
          </div>
          <button
            id="focusToggle"
            class="focus-toggle"
            type="button"
            aria-pressed="false"
          >
            <span class="focus-toggle__label">Focus Mode</span>
            <span class="focus-toggle__pill">
              <span class="focus-toggle__dot"></span>
            </span>
          </button>
          <div class="header-info">
            <span class="char-count" id="charCount">0</span> characters
            <button id="clearBtn" class="clear-btn" title="Clear all notes">
              Clear
            </button>
          </div>
        </div>
      </header>

      <main>
        <textarea
          id="notepad"
          placeholder="Write your thoughts, ideas, and notes here... They'll be saved automatically as you type."
          spellcheck="true"
        ></textarea>
      </main>

      <footer>
        <p>
          Saved automatically to your browser | No backend, no accounts needed
        </p>
        <p class="last-saved" id="lastSaved"></p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
